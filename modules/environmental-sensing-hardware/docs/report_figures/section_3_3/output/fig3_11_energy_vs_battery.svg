   <text style="fill: #991b1b; font: 10.2px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif" transform="translate(771.022109 294.953875)">结论摘要</text>
   <text style="fill: #991b1b; font: 10.2px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif" transform="translate(771.022109 309.874084)">当前任务明显超出电池约束，应判定为“不可直接执行”。建议缩短航线、降低载荷、更换电池或重新规划。</text>

   <text style="fill: #1f2937; font: 10.2px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif" transform="translate(771.022109 110.633875)">场景说明</text>
   <text style="fill: #1f2937; font: 10.2px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif" transform="translate(771.022109 125.554084)">本图对应“典型压力任务场景”，用于展示复杂城市低空任务中路线过长或风场不利时，系统如何提前识别“电量不足”。</text>

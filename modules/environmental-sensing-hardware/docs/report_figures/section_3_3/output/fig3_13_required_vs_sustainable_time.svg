  </g>
  <g id="text_20">
   <text style="fill: #4b5563; font: 10.5px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif; text-anchor: middle" x="537.934109" y="528.851406" transform="rotate(-0 537.934109 528.851406)">该图区分规划航线所需飞行时间与当前条件下可持续飞行时间，避免与算法运行耗时混淆。</text>

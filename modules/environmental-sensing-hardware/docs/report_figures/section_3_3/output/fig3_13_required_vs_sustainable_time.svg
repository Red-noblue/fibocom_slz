   <text style="fill: #1f2937; font: 9.8px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif" transform="translate(819.022109 288.8755)">指标说明</text>
   <text style="fill: #1f2937; font: 9.8px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif" transform="translate(819.022109 303.210603)">47.1 min 指执行该规划航线预计需要的飞行时间；7.7 min</text>
   <text style="fill: #1f2937; font: 9.8px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif" transform="translate(819.022109 317.545706)">指当前电池与环境条件下模型预测最多可持续飞行的时间。该指标不是算法计算耗时，不应与全局规划耗时</text>
   <text style="fill: #1f2937; font: 9.8px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif" transform="translate(819.022109 331.880809)">118 ms 混淆。</text>
  </g>

   <text style="fill: #1f2937; font: 9.8px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif" transform="translate(819.022109 438.6355)">结论摘要</text>
   <text style="fill: #1f2937; font: 9.8px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif" transform="translate(819.022109 452.970603)">规划航线虽然在空间上可生成，但在时间/电量约束下不可完成；“能规划出来”不等于“能飞得完”。</text>
  </g>

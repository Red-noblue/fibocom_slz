   <text style="fill: #1f2937; font: 10.2px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif" transform="translate(819.022109 110.633875)">场景说明</text>
   <text style="fill: #1f2937; font: 10.2px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif" transform="translate(819.022109 125.554084)">该图对应典型长航程或高负载压力任务，用于说明任务的“时间可行性”和“续航可行性”之间存在差异。</text>
   <text style="fill: #1f2937; font: 10.2px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif" transform="translate(819.022109 140.474294)"/>
   <text style="fill: #1f2937; font: 10.2px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif" transform="translate(819.022109 155.394503)">应用：起飞前决策、物流时效分析、巡检任务时间窗口判断。</text>
  </g>

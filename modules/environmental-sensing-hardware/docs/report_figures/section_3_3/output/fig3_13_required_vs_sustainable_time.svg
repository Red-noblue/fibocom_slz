  <g id="text_14">
   <text style="fill: #1f2937; font: 700 22px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif; text-anchor: start" x="150.862109" y="24.755312" transform="rotate(-0 150.862109 24.755312)">规划航线预计飞行时长与预测可持续飞行时长对照图</text>
  </g>
  <g id="text_15">
   <text style="fill: #4b5563; font: 13.5px 'Noto Sans CJK JP', 'DejaVu Sans', sans-serif; text-anchor: start" x="150.862109" y="47.795313" transform="rotate(-0 150.862109 47.795313)">区分航线执行所需时间与当前电池、环境条件下可持续飞行时间。</text>
  </g>

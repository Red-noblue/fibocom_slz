# 历史天气回填配置
base_url: https://archive-api.open-meteo.com/v1/archive
method: GET
params:
  latitude: "{lat}"
  longitude: "{lon}"
  start_date: "{start_date}"
  end_date: "{end_date}"
  hourly: temperature_2m,relative_humidity_2m,pressure_msl,precipitation,wind_speed_10m,wind_direction_10m,wind_speed_100m,wind_direction_100m,wind_gusts_10m
  timezone: "{timezone}"
  wind_speed_unit: ms
  models: era5
headers: {}
time:
  path: hourly.time
  format: "%Y-%m-%dT%H:%M"
fields:
  temperature_c: hourly.temperature_2m
  relative_humidity_pct: hourly.relative_humidity_2m
  wind_speed_mps: hourly.wind_speed_10m
  wind_dir_deg: hourly.wind_direction_10m
  wind_speed_100m_mps: hourly.wind_speed_100m
  wind_dir_100m_deg: hourly.wind_direction_100m
  wind_gust_mps: hourly.wind_gusts_10m
  pressure_hpa: hourly.pressure_msl
  precipitation_mm: hourly.precipitation

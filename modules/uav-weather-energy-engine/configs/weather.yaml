# 天气接口配置
base_url: https://api.open-meteo.com/v1/forecast
method: GET
params:
  latitude: "{lat}"
  longitude: "{lon}"
  hourly: temperature_2m,relative_humidity_2m,pressure_msl,precipitation,wind_speed_10m,wind_direction_10m,wind_speed_100m,wind_direction_100m,wind_gusts_10m,visibility,uv_index
  timezone: Asia/Shanghai
  forecast_days: "2"
headers: {}
time:
  path: hourly.time
  format: "%Y-%m-%dT%H:%M"
fields:
  temperature_c: hourly.temperature_2m
  relative_humidity_pct: hourly.relative_humidity_2m
  wind_speed_mps: hourly.wind_speed_10m
  wind_dir_deg: hourly.wind_direction_10m
  wind_speed_100m_mps: hourly.wind_speed_100m
  wind_dir_100m_deg: hourly.wind_direction_100m
  wind_gust_mps: hourly.wind_gusts_10m
  pressure_hpa: hourly.pressure_msl
  precipitation_mm: hourly.precipitation
  visibility_m: hourly.visibility
  uv_index: hourly.uv_index
timezone: Asia/Shanghai
